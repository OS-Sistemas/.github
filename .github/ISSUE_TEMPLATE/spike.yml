name: Spike ou investigação
description: Registrar investigação técnica com tempo e resultado definidos.
title: "[Spike]: "
labels:
  - "type:spike"
  - "status:triage"
body:
  - type: textarea
    id: question
    attributes:
      label: Pergunta a responder
      description: Defina a decisão ou incerteza que motivou a investigação.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: Alternativas a avaliar
      placeholder: |
        1.
        2.
        3.
  - type: input
    id: timebox
    attributes:
      label: Timebox
      placeholder: Exemplo: 2 dias
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Saída esperada
      value: |
        - [ ] Conclusão documentada
        - [ ] Recomendação
        - [ ] Riscos e limitações
        - [ ] ADR ou novas Issues, quando aplicável
    validations:
      required: true
  - type: dropdown
    id: team
    attributes:
      label: Time responsável
      options:
        - Dev
        - RPA
        - Dados
        - Platform
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Prioridade
      options:
        - P0 Critical
        - P1 High
        - P2 Medium
        - P3 Low
    validations:
      required: true
