name: Epic ou iniciativa
description: Registrar um resultado amplo composto por várias entregas.
title: "[Epic]: "
labels:
  - "type:epic"
  - "status:triage"
body:
  - type: markdown
    attributes:
      value: |
        Utilize Epic para resultados amplos. As entregas executáveis devem ser divididas em Issues menores.
  - type: textarea
    id: context
    attributes:
      label: Contexto e problema
      description: Explique o cenário atual e por que a iniciativa é necessária.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Resultado esperado
      description: Descreva o resultado de negócio ou técnico esperado.
    validations:
      required: true
  - type: textarea
    id: success
    attributes:
      label: Indicadores de sucesso
      description: Informe como o resultado será medido.
      placeholder: |
        - Indicador:
        - Baseline:
        - Meta:
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Escopo
      placeholder: |
        Inclui:
        -
        Não inclui:
        -
    validations:
      required: true
  - type: dropdown
    id: team
    attributes:
      label: Time responsável
      options:
        - Dev
        - RPA
        - Dados
        - Platform
        - Mult times
    validations:
      required: true
  - type: dropdown
    id: core
    attributes:
      label: Núcleo ou produto
      options:
        - JOBS
        - SGI-Frontend
        - SGI-Backend
        - Platform
        - Outro
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Prioridade
      options:
        - P0 Critical
        - P1 High
        - P2 Medium
        - P3 Low
    validations:
      required: true
  - type: input
    id: original_ticket
    attributes:
      label: Ticket interno relacionado
      placeholder: ID ou link
